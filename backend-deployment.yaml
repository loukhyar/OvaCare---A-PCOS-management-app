apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ovacare-backend
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: GEMINI_API_KEY
              value: "AIzaSyBtJxiPTjao8uXEICSZGimnnA273XiPjsw"
            - name: MONGO_URI
              value: "mongodb+srv://loukhyaofficial:A8R.hMXJZX4uPzk@cluster0.rxqlwiu.mongodb.net/?appName=Cluster0"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30007